<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>World Cup Forecaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://flagcdn.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04100a;
      --bg-2: #061811;
      --glass: rgba(20, 46, 34, 0.30);
      --glass-2: rgba(26, 54, 40, 0.40);
      --glass-hi: rgba(255,255,255,0.11);
      --stroke: rgba(255,255,255,0.15);
      --stroke-soft: rgba(255,255,255,0.07);
      --mint: #34f5a0;
      --mint-deep: #18a866;
      --green: #34f5a0;
      --red: #ff5a6a;
      --navy: #5b6bff;
      --cream: #eef5f0;
      --text: #eef5f0;
      --muted: #86a596;
      --font: "Urbanist", system-ui, sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
    body {
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      background:
        radial-gradient(130% 95% at 50% -15%, rgba(52,245,160,0.30), rgba(52,245,160,0) 48%),
        radial-gradient(100% 70% at 88% 115%, rgba(34,220,140,0.22), transparent 58%),
        radial-gradient(85% 60% at 6% 34%, rgba(24,168,102,0.20), transparent 66%),
        radial-gradient(60% 48% at 64% 58%, rgba(52,245,160,0.12), transparent 70%),
        linear-gradient(180deg, #051911 0%, #03130c 52%, #020c07 100%);
      letter-spacing: -0.01em;
    }
    .pitch-lines { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.10; }
    .bg-scene { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.30; }
    #app { position: relative; z-index: 1; height: 100vh; width: 100vw; }

    /* ---------- AUTH ---------- */
    .auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; position: relative; overflow: hidden; }
    .auth-flags { position: absolute; top: 0; left: 0; right: 0; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 20px; opacity: 0.5; filter: drop-shadow(0 4px 12px rgba(0,0,0,.5)) saturate(.9); }
    .auth-flags img { width: 32px; height: 21px; border-radius: 3px; }
    .auth-flags-bottom { top: auto; bottom: 0; }
    .auth-box { background: var(--glass); backdrop-filter: blur(30px) saturate(1.4); -webkit-backdrop-filter: blur(30px) saturate(1.4); border: 1px solid var(--stroke); border-radius: 26px; padding: 38px 30px; width: 100%; max-width: 372px; box-shadow: 0 40px 90px rgba(0,0,0,.6), inset 0 1px 0 var(--glass-hi); position: relative; z-index: 2; }
    .auth-crest { width: 66px; height: 66px; margin: 0 auto 18px; border-radius: 22px; background: linear-gradient(145deg, rgba(52,245,160,.9), rgba(24,168,102,.85)); display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 12px 36px rgba(52,245,160,.4), inset 0 -3px 10px rgba(0,0,0,.3); }
    .auth-kicker { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: .28em; color: var(--mint); text-transform: uppercase; margin-bottom: 10px; }
    .auth-title { font-size: 38px; line-height: 1.0; font-weight: 300; color: var(--cream); text-align: center; margin: 0 0 8px; letter-spacing: -0.02em; }
    .auth-sub { text-align: center; color: var(--muted); font-size: 13px; font-weight: 500; margin: 0 0 26px; }
    .auth-input { width: 100%; padding: 14px 16px; background: rgba(0,0,0,.28); border: 1px solid var(--stroke); border-radius: 13px; color: var(--cream); font-size: 15px; font-weight: 500; margin-bottom: 12px; font-family: var(--font); transition: border-color .15s; }
    .auth-input:focus { outline: none; border-color: var(--mint); }
    .auth-input::placeholder { color: #5e7468; }
    .auth-btn { width: 100%; padding: 15px; background: linear-gradient(180deg, var(--mint), var(--mint-deep)); color: #032015; border: none; border-radius: 13px; font-weight: 700; cursor: pointer; font-size: 15px; margin-top: 6px; font-family: var(--font); letter-spacing: .01em; transition: transform .12s, filter .12s; }
    .auth-btn:active { transform: scale(.98); }
    .auth-btn:hover { filter: brightness(1.06); }
    .auth-toggle { font-size: 13px; text-align: center; color: var(--muted); margin-top: 18px; font-weight: 500; }
    .auth-link { color: var(--mint); cursor: pointer; font-weight: 700; }
    .auth-err { background: rgba(255,90,106,.13); border: 1px solid rgba(255,90,106,.4); color: #ffc0c6; font-size: 12.5px; font-weight: 500; padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; display: none; }
    .auth-age { display: flex; gap: 10px; align-items: flex-start; font-size: 12px; color: var(--muted); margin: 4px 0 14px; line-height: 1.45; font-weight: 500; }
    .auth-age input { margin-top: 1px; accent-color: var(--mint); width: 17px; height: 17px; flex-shrink: 0; }

    /* ---------- SHELL ---------- */
    .shell { display: flex; flex-direction: column; height: 100vh; max-width: 540px; margin: 0 auto; position: relative; box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 30px 90px rgba(0,0,0,.55); background: linear-gradient(180deg, rgba(4,16,10,.18), rgba(2,11,7,.42)); }
    .topbar { background: rgba(4,14,9,.72); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--stroke-soft); padding: 13px 17px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-badge { width: 34px; height: 34px; border-radius: 11px; background: linear-gradient(145deg, rgba(52,245,160,.9), rgba(24,168,102,.85)); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; box-shadow: 0 6px 18px rgba(52,245,160,.3); }
    .brand h1 { margin: 0; font-size: 16px; font-weight: 600; color: var(--cream); line-height: 1.05; letter-spacing: -0.01em; white-space: nowrap; }
    .brand .brand-sub { font-size: 9.5px; font-weight: 600; letter-spacing: .18em; color: var(--mint); text-transform: uppercase; margin-top: 2px; white-space: nowrap; }
    .topbar-right { display: flex; gap: 10px; align-items: center; }
    .user-chip { font-size: 11px; color: var(--muted); max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .icon-btn { background: rgba(255,255,255,.05); border: 1px solid var(--stroke); color: var(--cream); width: 34px; height: 34px; border-radius: 10px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active { transform: scale(.93); }

    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .content::-webkit-scrollbar { width: 0; }
    .screen { display: none; padding: 18px 15px 30px; }
    .screen.active { display: block; animation: fade .28s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }

    /* ---------- TAB BAR ---------- */
    .tabbar { display: flex; background: rgba(3,12,8,.82); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-top: 1px solid var(--stroke-soft); flex-shrink: 0; padding: 7px 4px calc(7px + env(safe-area-inset-bottom)); }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px 2px; font-family: var(--font); font-size: 10px; font-weight: 600; transition: color .15s; }
    .tab-btn .ti { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; transition: transform .15s; }
    .tab-btn .ti svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .tab-btn.active { color: var(--mint); }
    .tab-btn.active .ti { transform: translateY(-1px); }
    .tab-btn.active .ti svg { filter: drop-shadow(0 0 6px rgba(52,245,160,.6)); }

    /* ---------- SHARED ---------- */
    .section-title { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; font-weight: 700; margin: 24px 4px 12px; display: flex; align-items: center; gap: 9px; }
    .section-title:first-child { margin-top: 4px; }
    .section-title .rule { flex: 1; height: 1px; background: var(--stroke-soft); }
    .panel { background: var(--glass); backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); -webkit-backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); border: 1px solid var(--stroke); border-radius: 18px; padding: 15px; box-shadow: inset 0 1px 0 var(--glass-hi), 0 8px 30px rgba(0,0,0,.18); }
    .flag { width: 27px; height: 18px; border-radius: 3px; object-fit: cover; box-shadow: 0 1px 4px rgba(0,0,0,.5); flex-shrink: 0; background: #1a2a22; }
    .flag-lg { width: 42px; height: 28px; border-radius: 5px; }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    .run-banner { display: flex; align-items: center; gap: 10px; background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid var(--stroke); border-radius: 15px; padding: 12px 14px; font-size: 12.5px; font-weight: 500; color: var(--muted); margin-bottom: 6px; box-shadow: inset 0 1px 0 var(--glass-hi); }
    .run-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 8px var(--mint); flex-shrink: 0; }

    /* equalizer */
    .eq { display: flex; align-items: flex-end; gap: 3px; height: 26px; }
    .eq i { width: 3px; background: linear-gradient(180deg, var(--mint), rgba(52,245,160,.25)); border-radius: 2px; animation: eqb 1.1s ease-in-out infinite; }
    @keyframes eqb { 0%,100% { height: 25%; } 50% { height: 100%; } }

    /* Synapse-style live pulse hero */
    .pulse-card { background: var(--glass); backdrop-filter: blur(30px) saturate(1.5) brightness(1.06); -webkit-backdrop-filter: blur(30px) saturate(1.5) brightness(1.06); border: 1px solid var(--stroke); border-radius: 22px; padding: 18px; box-shadow: inset 0 1px 0 var(--glass-hi), 0 12px 40px rgba(0,0,0,.22); margin: 14px 0 4px; }
    .pulse-top { display: flex; align-items: center; gap: 16px; }
    .pulse-ring { position: relative; width: 92px; height: 92px; flex-shrink: 0; }
    .pulse-ring svg { transform: rotate(-90deg); }
    .pulse-ring .pr-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .pulse-ring .pr-v { font-size: 23px; font-weight: 300; color: var(--mint); letter-spacing: -0.02em; line-height: 1; }
    .pulse-ring .pr-u { font-size: 8.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 3px; }
    .pulse-meta { flex: 1; min-width: 0; }
    .pulse-meta .pm-l { font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; }
    .pulse-meta .pm-v { font-size: 38px; font-weight: 300; letter-spacing: -0.03em; line-height: 1.0; margin-top: 3px; }
    .pulse-meta .pm-d { font-size: 12px; font-weight: 500; color: var(--mint); margin-top: 6px; display: flex; align-items: center; gap: 6px; }
    .pulse-meta .pm-d .dd { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 7px var(--mint); }
    .wave { display: flex; align-items: flex-end; gap: 3px; height: 44px; margin-top: 16px; }
    .wave i { flex: 1; background: linear-gradient(180deg, var(--mint), rgba(52,245,160,.12)); border-radius: 2px; min-width: 2px; transform-origin: bottom; animation: wv 1.5s ease-in-out infinite; }
    @keyframes wv { 0%,100% { transform: scaleY(.5); } 50% { transform: scaleY(1); } }
    .wave-foot { display: flex; justify-content: space-between; font-size: 9.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .09em; margin-top: 9px; }

    /* Top cards */
    .top-strip { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .top-card { background: var(--glass); backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); -webkit-backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); border: 1px solid var(--stroke); border-radius: 18px; padding: 15px; position: relative; overflow: hidden; box-shadow: inset 0 1px 0 var(--glass-hi), 0 8px 30px rgba(0,0,0,.18); }
    .top-card:first-child { grid-column: 1 / -1; background: linear-gradient(135deg, rgba(52,245,160,.16), var(--glass) 55%); border-color: rgba(52,245,160,.3); }
    .top-card .rank { font-size: 10px; font-weight: 700; color: var(--mint); letter-spacing: .14em; text-transform: uppercase; }
    .top-card .tc-head { display: flex; align-items: center; gap: 10px; margin: 9px 0 10px; }
    .top-card .tc-name { font-weight: 600; font-size: 15px; }
    .top-card .tc-pct { font-weight: 300; font-size: 32px; color: var(--mint); line-height: 1; letter-spacing: -0.02em; }
    .top-card:first-child .tc-pct { font-size: 44px; }
    .top-card .tc-drivers { margin-top: 10px; font-size: 11px; font-weight: 500; color: var(--muted); line-height: 1.55; }

    /* rows */
    .rows { background: var(--glass); backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); -webkit-backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); border: 1px solid var(--stroke); border-radius: 18px; overflow: hidden; box-shadow: inset 0 1px 0 var(--glass-hi), 0 8px 30px rgba(0,0,0,.18); }
    .team-row { display: flex; gap: 12px; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--stroke-soft); cursor: pointer; transition: background .15s; }
    .team-row:last-child { border-bottom: none; }
    .team-row:active { background: rgba(255,255,255,.04); }
    .t-rank { width: 18px; text-align: right; font-size: 12px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
    .t-name { flex: 1; min-width: 0; }
    .t-name .nm { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-name .grp { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .04em; margin-top: 1px; }
    .t-bar-wrap { width: 54px; height: 5px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .t-bar { height: 100%; background: linear-gradient(90deg, var(--mint-deep), var(--mint)); border-radius: 3px; box-shadow: 0 0 8px rgba(52,245,160,.5); }
    .t-pct { font-size: 17px; font-weight: 400; color: var(--mint); width: 44px; text-align: right; flex-shrink: 0; }
    .t-delta { width: 42px; text-align: right; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .up { color: var(--mint); } .down { color: var(--red); } .flat { color: var(--muted); }
    .star { width: 30px; height: 30px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 15px; color: var(--muted); background: none; border: none; }
    .star.on { color: var(--mint); }

    /* ---------- LIVE ---------- */
    .live-hero { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .live-hero .lh-title { font-size: 28px; font-weight: 300; letter-spacing: -0.02em; }
    .live-pill { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,90,106,.15); border: 1px solid rgba(255,90,106,.45); color: var(--red); font-size: 11px; font-weight: 700; padding: 5px 11px; border-radius: 20px; letter-spacing: .06em; }
    .live-pill .ld { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: blink 1.1s infinite; box-shadow: 0 0 7px var(--red); }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

    .match-card { background: var(--glass); backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); -webkit-backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); border: 1px solid var(--stroke); border-radius: 18px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: border-color .15s, transform .1s; box-shadow: inset 0 1px 0 var(--glass-hi), 0 8px 30px rgba(0,0,0,.18); }
    .match-card:active { transform: scale(.995); }
    .match-card.is-live { border-color: rgba(52,245,160,.28); box-shadow: inset 0 1px 0 var(--glass-hi), 0 0 30px rgba(52,245,160,.07); }
    .mc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 13px; }
    .mc-comp { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; }
    .mc-min { font-size: 12px; font-weight: 700; }
    .mc-min.live { color: var(--mint); } .mc-min.ft { color: var(--muted); } .mc-min.ht { color: var(--mint); }
    .mc-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
    .mc-team { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mc-team.away { flex-direction: row-reverse; text-align: right; }
    .mc-team .mt-nm { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mc-score { font-size: 28px; font-weight: 400; letter-spacing: -0.01em; white-space: nowrap; }
    .mc-score .sep { color: var(--muted); margin: 0 3px; font-weight: 400; }
    .mc-foot { display: flex; gap: 15px; margin-top: 13px; padding-top: 11px; border-top: 1px solid var(--stroke-soft); }
    .mc-stat { flex: 1; }
    .mc-stat .ms-l { font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .mc-stat .ms-v { font-size: 14px; font-weight: 600; color: var(--mint); }
    .poss-bar { height: 5px; border-radius: 3px; overflow: hidden; display: flex; margin-top: 6px; background: rgba(255,255,255,.08); }
    .poss-h { background: var(--mint); } .poss-a { background: var(--navy); }

    .ticker { background: var(--glass); backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); -webkit-backdrop-filter: blur(26px) saturate(1.4) brightness(1.05); border: 1px solid var(--stroke); border-radius: 18px; overflow: hidden; box-shadow: inset 0 1px 0 var(--glass-hi), 0 8px 30px rgba(0,0,0,.18); }
    .ev { display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px; border-bottom: 1px solid var(--stroke-soft); animation: evin .35s ease; }
    .ev:last-child { border-bottom: none; }
    @keyframes evin { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
    .ev-min { font-size: 12px; font-weight: 700; color: var(--muted); width: 28px; flex-shrink: 0; padding-top: 1px; }
    .ev-ico { width: 22px; flex-shrink: 0; text-align: center; font-size: 14px; }
    .ev-body { flex: 1; min-width: 0; }
    .ev-body .ev-t { font-size: 13px; font-weight: 600; }
    .ev-body .ev-s { font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 1px; }
    .ev.goal { background: rgba(52,245,160,.06); }

    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--mint); font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 13px; background: none; border: none; font-family: var(--font); padding: 4px 0; }
    .stat-line { display: grid; grid-template-columns: 46px 1fr 46px; align-items: center; gap: 10px; margin: 14px 0; }
    .stat-line .sv { font-size: 14px; font-weight: 600; }
    .stat-line .sv.r { text-align: right; }
    .stat-line .sl-track { height: 7px; background: rgba(255,255,255,.08); border-radius: 4px; display: flex; overflow: hidden; }
    .stat-line .sl-h { background: var(--mint); height: 100%; box-shadow: 0 0 8px rgba(52,245,160,.5); }
    .stat-line .sl-a { background: var(--navy); height: 100%; }
    .stat-lbl { text-align: center; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; }

    .funnel-row { display: flex; align-items: center; gap: 11px; margin: 10px 0; }
    .funnel-lbl { width: 48px; font-size: 11px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
    .funnel-track { flex: 1; height: 24px; background: rgba(255,255,255,.05); border-radius: 7px; overflow: hidden; }
    .funnel-fill { height: 100%; background: linear-gradient(90deg, var(--mint-deep), var(--mint)); border-radius: 7px; display: flex; align-items: center; padding-left: 9px; font-size: 11px; font-weight: 700; color: #032015; transition: width .85s cubic-bezier(.2,.8,.2,1); box-shadow: 0 0 12px rgba(52,245,160,.35); }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin: 11px 0; }
    .stat-box { background: var(--glass-2); backdrop-filter: blur(20px) saturate(1.3); -webkit-backdrop-filter: blur(20px) saturate(1.3); border: 1px solid var(--stroke); border-radius: 15px; padding: 13px; box-shadow: inset 0 1px 0 var(--glass-hi); }
    .stat-box .sb-l { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .stat-box .sb-v { font-size: 23px; font-weight: 300; color: var(--mint); margin-top: 5px; letter-spacing: -0.02em; }
    .stat-box .sb-x { font-size: 10px; font-weight: 500; color: var(--muted); margin-top: 2px; }

    .null-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(91,107,255,.1); border: 1px dashed rgba(91,107,255,.45); color: #aeb6ff; font-size: 12px; font-weight: 500; padding: 11px 13px; border-radius: 12px; line-height: 1.4; }

(function () {
  const T = WCF.teamByCode;
  function mk(homeCode, awayCode, comp, min, hs, as_, status) {
    const h = T[homeCode], a = T[awayCode];
    return {
      id: homeCode + '-' + awayCode,
      comp,
      home: { code: h.code, name: h.name, iso: h.iso },
      away: { code: a.code, name: a.name, iso: a.iso },
      hs, as: as_, min, status, // status: LIVE | HT | FT | UP (upcoming)
      poss: 50 + Math.round((h.win - a.win) * 1.2),
      shotsH: Math.round(min/9) + (hs*2), shotsA: Math.round(min/11) + (as_*2),
      sotH: hs + Math.round(min/30), sotA: as_ + Math.round(min/40),
      xgH: +(hs * 0.8 + min * 0.012 + 0.3).toFixed(2),
      xgA: +(as_ * 0.8 + min * 0.009 + 0.2).toFixed(2),
      cornersH: Math.round(min/18), cornersA: Math.round(min/24),
      events: []
    };
  }

  // Seed a slate of group-stage fixtures across states
  WCF.matches = [
    mk('ESP','URU','Group A · MD2', 67, 2, 0, 'LIVE'),
    mk('ENG','SRB','Group C · MD2', 38, 1, 1, 'LIVE'),

  ];

    { min: 61, type: 'GOAL', team: 'ARG', txt: 'Goal — Argentina', sub: '2–1.' },
    { min: 78, type: 'GOAL', team: 'ARG', txt: 'Goal — Argentina', sub: '3–1.' },
    { min: 88, type: 'RED', team: 'POL', txt: 'Red card — Poland', sub: 'Second bookable offence.' }
  ];

  const FIRST = ['L. Martín','D. Olsen','K. Adeyemi','M. Costa','R. Nilsen','T. Vidal','A. Hassan','J. Park','S. Rossi','P. Novak'];
  const LAST = ['header','strike','volley','tap-in','penalty','free-kick','counter','solo run'];
  const pick = a => a[Math.floor(Math.random() * a.length)];

  // advance one match by a "minute"
  function step(m) {
    if (m.status === 'FT' || m.status === 'UP') return false;
    if (m.status === 'HT') { // resume after a couple ticks
      m._htTicks = (m._htTicks || 0) + 1;
      if (m._htTicks >= 2) { m.status = 'LIVE'; m.min = 46; }
      return true;
    }
    m.min += 1;

    // stat drift
    m.poss = Math.max(28, Math.min(72, m.poss + (Math.random() * 6 - 3)));
    if (Math.random() < 0.5) m.shotsH += 1; if (Math.random() < 0.45) m.shotsA += 1;
    m.xgH = +(m.xgH + Math.random() * 0.05).toFixed(2);
    m.xgA = +(m.xgA + Math.random() * 0.04).toFixed(2);

    // random events
    const r = Math.random();
    const favHome = m.poss >= 50;
    if (r < 0.05) { // goal
      const team = (Math.random() < (favHome ? 0.6 : 0.4)) ? m.home : m.away;
      if (team.code === m.home.code) { m.hs += 1; m.sotH += 1; m.xgH = +(m.xgH + 0.4).toFixed(2); }
      else { m.as += 1; m.sotA += 1; m.xgA = +(m.xgA + 0.4).toFixed(2); }
      m.events.push({ min: m.min, type: 'GOAL', team: team.code, txt: 'Goal — ' + team.name, sub: pick(FIRST) + ' with a ' + pick(LAST) + '. ' + m.hs + '–' + m.as + '.' });
      return true;
    } else if (r < 0.09) {
      const team = Math.random() < 0.5 ? m.home : m.away;
      m.events.push({ min: m.min, type: 'CHANCE', team: team.code, txt: 'Big chance — ' + team.name, sub: pick(FIRST) + ' denied by a fine save.' });
    } else if (r < 0.115) {
      const team = Math.random() < 0.5 ? m.home : m.away;
      m.events.push({ min: m.min, type: 'YELLOW', team: team.code, txt: 'Yellow card — ' + team.name, sub: 'Booking for a late challenge.' });
    }

    if (m.min === 45 && !m._didHT) { m._didHT = true; m.status = 'HT'; }
    if (m.min >= 90) { m.status = 'FT'; }
    return true;
  }

  WCF.liveTick = function () {
    let changed = false;
    WCF.matches.forEach(m => { if (step(m)) changed = true; });
    return changed;
  };

  // all events across live matches, newest first, with match label
  WCF.allMoments = function () {
    const out = [];
    WCF.matches.forEach(m => {
      m.events.forEach(e => out.push(Object.assign({ matchId: m.id, label: m.home.code + ' v ' + m.away.code }, e)));
    });
    return out.sort((a, b) => b.min - a.min).slice(0, 14);
  };

  WCF.liveCount = function () { return WCF.matches.filter(m => m.status === 'LIVE' || m.status === 'HT').length; };
})();

    $('#logoutBtn').onclick = () => { if (fbReady && auth.currentUser) auth.signOut(); state.user = null; stopLive(); renderAuth(); };
    document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => switchTab(b.dataset.tab));
    switchTab(state.tab);
    startLive();
    fetchLive();
  }

  function switchTab(tab) {
    state.tab = tab;
    if (tab !== 'teams') state.selTeam = null;
    if (tab !== 'live') state.selMatch = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab || (tab === 'method' && b.dataset.tab === 'me')));
    renderTab();
  }

  function renderTab() {
    const c = $('#content'); if (!c) return;
    c.innerHTML = `<div class="screen active">${SCREENS[state.tab] ? SCREENS[state.tab]() : ''}</div>`;
    wireTab();
  }

  const SCREENS = {
    live: screenLive, forecast: screenForecast, teams: screenTeams,
    match: screenMatch, bet: screenBet, me: screenMe, method: screenMethod
  };

  // =================== LIVE ===================
  function minLabel(m) {
    if (m.status === 'FT') return 'FULL TIME';
    if (m.status === 'HT') return 'HALF TIME';
    if (m.status === 'UP') return 'KICKS OFF SOON';
    return m.min + "'";
  }
  function matchCard(m) {
    const cls = (m.status === 'LIVE' || m.status === 'HT') ? 'is-live' : '';
    const minCls = m.status === 'LIVE' ? 'live' : m.status === 'HT' ? 'ht' : 'ft';
    const possA = 100 - m.poss;
    return `
      <div class="match-card ${cls}" data-match="${m.id}">
        <div class="mc-top"><span class="mc-comp">${m.comp}</span><span class="mc-min ${minCls}">${m.status === 'LIVE' ? '● ' : ''}${minLabel(m)}</span></div>
        <div class="mc-teams">
          <div class="mc-team home">${flag(m.home.iso)}<span class="mt-nm">${m.home.name}</span></div>
          <div class="mc-score num">${m.hs}<span class="sep">–</span>${m.as}</div>
          <div class="mc-team away">${flag(m.away.iso)}<span class="mt-nm">${m.away.name}</span></div>
        </div>
        ${m.status !== 'UP' ? `
        <div class="mc-foot">
          <div class="mc-stat"><div class="ms-l">Possession</div><div class="poss-bar"><div class="poss-h" style="width:${m.poss}%"></div><div class="poss-a" style="width:${possA}%"></div></div></div>
          <div class="mc-stat"><div class="ms-l">Shots</div><div class="ms-v num">${m.shotsH}–${m.shotsA}</div></div>
          <div class="mc-stat"><div class="ms-l">xG</div><div class="ms-v num">${m.xgH.toFixed(1)}–${m.xgA.toFixed(1)}</div></div>
        </div>` : ''}
      </div>`;
  }
  function eqBars() { return '<div class="eq">' + [0,1,2,3,4,5,6].map(i => `<i style="animation-delay:${i*0.12}s"></i>`).join('') + '</div>'; }
  function fmtKick(d) { const dt = new Date(d); return dt.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + ' · ' + dt.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); }
  function getLive() { return state.liveMatches || []; }

  function countdownHero() {
    const k = new Date(WCF.kickoff).getTime();
    let diff = Math.max(0, k - Date.now());
    const dd = Math.floor(diff / 86400000); diff -= dd * 86400000;
    const hh = Math.floor(diff / 3600000); diff -= hh * 3600000;
    const mm = Math.floor(diff / 60000); diff -= mm * 60000;
    const ss = Math.floor(diff / 1000);
    const cell = (v, l) => `<div style="text-align:center;flex:1"><div class="num" id="cd-${l}" style="font-size:40px;font-weight:300;letter-spacing:-0.03em;line-height:1">${String(v).padStart(2, '0')}</div><div style="font-size:9.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">${l}</div></div>`;
    const bars = Array.from({ length: 30 }, (_, i) => 20 + Math.round(Math.abs(Math.sin(i * 0.7) * 50) + (i % 5) * 7));
    return `
      <div class="pulse-card" id="cdHero">
        <div class="pm-l" style="margin-bottom:14px">Tournament kicks off in</div>
        <div style="display:flex;justify-content:space-between;gap:6px">${cell(dd, 'days')}${cell(hh, 'hrs')}${cell(mm, 'min')}${cell(ss, 'sec')}</div>
        <div class="wave">${bars.map((h, i) => `<i style="height:${h}%;animation-delay:${(i % 9) * 0.1}s"></i>`).join('')}</div>
        <div class="wave-foot"><span>Jun 11, 2026 · Estadio Azteca</span><span>Live scores activate at kickoff</span></div>
      </div>`;
  }

  function liveHero(matches) {
    const total = matches.length || 1;
    const liveN = matches.filter(m => m.status === 'LIVE' || m.status === 'HT').length;
    const goals = matches.reduce((s, m) => s + (m.hs || 0) + (m.as || 0), 0);
    const pct = Math.round(liveN / total * 100);
    const R = 40, C = 2 * Math.PI * R, off = C * (1 - pct / 100);
    const bars = Array.from({ length: 30 }, (_, i) => 28 + Math.round(Math.abs(Math.sin(i * 0.7) * 52) + (i % 5) * 7));
    return `
      <div class="pulse-card">
        <div class="pulse-top">
          <div class="pulse-ring">
            <svg width="92" height="92"><circle cx="46" cy="46" r="${R}" stroke="rgba(255,255,255,.08)" stroke-width="7" fill="none"/><circle cx="46" cy="46" r="${R}" stroke="#34f5a0" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="filter:drop-shadow(0 0 6px rgba(52,245,160,.6));transition:stroke-dashoffset .8s"/></svg>
            <div class="pr-num"><div class="pr-v num">${pct}%</div><div class="pr-u">In play</div></div>
          </div>
          <div class="pulse-meta">
            <div class="pm-l">Goals today</div>
            <div class="pm-v num">${goals}</div>
            <div class="pm-d"><span class="dd"></span>${liveN} matches live now</div>
          </div>
        </div>
        <div class="wave">${bars.map((h, i) => `<i style="height:${h}%;animation-delay:${(i % 9) * 0.1}s"></i>`).join('')}</div>
        <div class="wave-foot"><span>Match tempo</span><span>Live · auto-updating</span></div>
      </div>`;
  }

  function fixtureCard(f) {
    const h = WCF.teamByCode[f.home], a = WCF.teamByCode[f.away];
    if (!h || !a) return '';
    return `
      <div class="match-card" style="cursor:default">
        <div class="mc-top"><span class="mc-comp">Group ${f.grp}</span><span class="mc-min ft">${fmtKick(f.d)}</span></div>
        <div class="mc-teams">
          <div class="mc-team home">${flag(h.iso)}<span class="mt-nm">${h.name}</span></div>
          <div class="mc-score" style="font-size:15px;font-weight:600;color:var(--muted)">vs</div>
          <div class="mc-team away">${flag(a.iso)}<span class="mt-nm">${a.name}</span></div>
        </div>
        <div class="mc-foot"><div class="mc-stat"><div class="ms-l">Venue</div><div style="font-size:11.5px;font-weight:500;color:var(--cream);margin-top:3px">${f.venue}</div></div></div>
      </div>`;
  }

  function preTournament() {
    return `
      <div class="live-hero"><span class="lh-title">Live Centre</span><span class="pill" style="border-color:var(--stroke)">Pre-tournament</span></div>
      ${countdownHero()}
      <div class="panel" style="margin:12px 0 4px;font-size:12.5px;font-weight:500;color:var(--muted);line-height:1.6">⚽ The 2026 World Cup hasn't kicked off yet, so there are no live scores to show. This screen switches to <strong style="color:var(--cream)">real-time scores, stats and key moments</strong> automatically once matches begin. Until then, explore the <strong style="color:var(--cream)">Forecast</strong>, set your <strong style="color:var(--cream)">champion pick</strong>, and try the <strong style="color:var(--cream)">Match simulator</strong>.</div>
      <div class="section-title">Opening fixtures<span class="rule"></span></div>
      ${WCF.fixtures.map(fixtureCard).join('')}`;
  }

  function screenLive() {
    if (state.selMatch) return matchDetail(state.selMatch);
    if (state.liveMode === 'live' && getLive().length) {
      const matches = getLive();
      const live = matches.filter(m => m.status === 'LIVE' || m.status === 'HT');
      const done = matches.filter(m => m.status === 'FT');
      const up = matches.filter(m => m.status === 'UP');
      return `
        <div class="live-hero"><span class="lh-title">Live Centre</span><span class="live-pill"><span class="ld"></span>${live.length} LIVE</span></div>
        ${liveHero(matches)}
        <div class="section-title">In play<span class="rule"></span></div>
        <div id="liveList">${live.map(matchCard).join('') || '<div class="panel" style="color:var(--muted);font-size:13px">No matches in play right now.</div>'}</div>
        <div class="section-title">Key moments<span class="rule"></span></div>
        <div class="ticker" id="moments">${momentsHTML(matches)}</div>
        ${up.length ? `<div class="section-title">Up next<span class="rule"></span></div>${up.map(matchCard).join('')}` : ''}
        ${done.length ? `<div class="section-title">Full time<span class="rule"></span></div>${done.map(matchCard).join('')}` : ''}`;
    }
    return preTournament();
  }
  function evIcon(type) { return type === 'GOAL' ? '⚽' : type === 'YELLOW' ? '🟨' : type === 'RED' ? '🟥' : type === 'SUB' ? '🔁' : '◎'; }
  function momentsHTML(matches) {
    const out = [];
    (matches || []).forEach(m => { (m.events || []).forEach(e => out.push(Object.assign({ label: (m.home.code || m.home.name) + ' v ' + (m.away.code || m.away.name) }, e))); });
    out.sort((a, b) => b.min - a.min);
    const top = out.slice(0, 14);
    if (!top.length) return '<div style="padding:14px;color:var(--muted);font-size:13px">No key moments yet.</div>';
    return top.map(e => `
      <div class="ev ${e.type === 'GOAL' ? 'goal' : ''}"><div class="ev-min num">${e.min}'</div><div class="ev-ico">${evIcon(e.type)}</div><div class="ev-body"><div class="ev-t">${e.txt}</div><div class="ev-s">${e.label}${e.sub ? ' · ' + e.sub : ''}</div></div></div>`).join('');
  }
  function matchDetail(id) {
    const m = getLive().find(x => x.id === id);
    if (!m) { state.selMatch = null; return screenLive(); }
    const possA = 100 - m.poss;
    const evs = (m.events || []).slice().sort((a, b) => b.min - a.min);
    const row = (label, h, a, hPct) => `<div><div class="stat-lbl">${label}</div><div class="stat-line"><div class="sv num">${h}</div><div class="sl-track"><div class="sl-h" style="width:${hPct}%"></div><div class="sl-a" style="width:${100 - hPct}%"></div></div><div class="sv r num">${a}</div></div></div>`;
    const totShots = (m.shotsH + m.shotsA) || 1, totXg = (m.xgH + m.xgA) || 1, totC = (m.cornersH + m.cornersA) || 1;
    return `
      <button class="back-link" id="backLive">← Live Centre</button>
      <div class="panel" style="margin-bottom:14px">
        <div class="mc-top"><span class="mc-comp">${m.comp}</span><span class="mc-min ${m.status === 'LIVE' ? 'live' : m.status === 'HT' ? 'ht' : 'ft'}">${m.status === 'LIVE' ? '● ' : ''}${minLabel(m)}</span></div>
        <div class="mc-teams" style="margin-top:6px"><div class="mc-team home">${flag(m.home.iso, 'flag-lg')}<span class="mt-nm">${m.home.name}</span></div><div class="mc-score num" style="font-size:36px">${m.hs}<span class="sep">–</span>${m.as}</div><div class="mc-team away">${flag(m.away.iso, 'flag-lg')}<span class="mt-nm">${m.away.name}</span></div></div>
      </div>
      <div class="section-title">Match stats<span class="rule"></span></div>
      <div class="panel">
        ${row('Possession %', Math.round(m.poss), Math.round(possA), m.poss)}
        ${row('Shots', m.shotsH, m.shotsA, m.shotsH / totShots * 100)}
        ${row('Shots on target', m.sotH, m.sotA, (m.sotH / ((m.sotH + m.sotA) || 1)) * 100)}
        ${row('Expected goals (xG)', m.xgH.toFixed(2), m.xgA.toFixed(2), m.xgH / totXg * 100)}
        ${row('Corners', m.cornersH, m.cornersA, m.cornersH / totC * 100)}
      </div>
      <div class="section-title">Timeline<span class="rule"></span></div>
      <div class="ticker">${evs.length ? evs.map(e => `<div class="ev ${e.type === 'GOAL' ? 'goal' : ''}"><div class="ev-min num">${e.min}'</div><div class="ev-ico">${evIcon(e.type)}</div><div class="ev-body"><div class="ev-t">${e.txt}</div><div class="ev-s">${e.sub}</div></div></div>`).join('') : '<div style="padding:14px;color:var(--muted);font-size:13px">No events yet.</div>'}</div>`;
  }

  // =================== FORECAST / TEAMS ===================
  function deltaCls(d) { return d > 0 ? 'up' : d < 0 ? 'down' : 'flat'; }
  function deltaTxt(d) { return (d > 0 ? '+' : '') + d.toFixed(1); }
  function teamRow(t) {
    const max = WCF.teams[0].win;
    const w = store.isWatched(t.code);
    return `
      <div class="team-row" data-team="${t.code}">
        <div class="t-rank num">${t.rank}</div>
        ${flag(t.iso)}
        <div class="t-name"><div class="nm">${t.name}</div><div class="grp">GRP ${t.grp} · ${t.conf}</div></div>
        <div class="t-bar-wrap"><div class="t-bar" style="width:${(t.win / max * 100)}%"></div></div>
        <div class="t-pct num">${t.win.toFixed(1)}</div>
        <div class="t-delta num ${deltaCls(t.delta)}">${deltaTxt(t.delta)}</div>
        <button class="star ${w ? 'on' : ''}" data-watch="${t.code}" title="Watchlist">${w ? '★' : '☆'}</button>
      </div>`;
  }
  function screenForecast() {
    const top = WCF.teams.slice(0, 5);
    const sorted = WCF.teams.slice().sort((a, b) => b[state.sortKey] - a[state.sortKey]);
    const topCards = top.map((t, i) => `
      <div class="top-card">
        <span class="rank">#${i + 1} to win</span>
        <div class="tc-head">${flag(t.iso, i === 0 ? 'flag-lg' : '')}<span class="tc-name">${t.name}</span></div>
        <div class="tc-pct num">${t.win.toFixed(1)}%</div>
        <div class="tc-drivers">${t.drivers.slice(0, i === 0 ? 3 : 2).map(d => '• ' + d).join('<br>')}</div>
      </div>`).join('');
    const cols = [['win', 'Winner'], ['final', 'Final'], ['sf', 'SF'], ['qf', 'QF'], ['r16', 'R16']];
    return `
      <div class="run-banner"><span class="run-dot"></span><div><strong style="color:var(--cream)">Run ${WCF.runDate}.</strong> ${WCF.runNote}</div></div>
      <div class="section-title">Title favourites<span class="rule"></span></div>
      <div class="top-strip">${topCards}</div>
      <div class="section-title">Full table — sort by<span class="rule"></span></div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin:0 2px 11px">
        ${cols.map(([k, l]) => `<button class="pill sortpill" data-sort="${k}" style="cursor:pointer;${state.sortKey === k ? 'background:rgba(52,245,160,.16);border-color:var(--mint);color:var(--mint)' : ''}">${l}</button>`).join('')}
      </div>
      <div class="rows">${sorted.map(teamRow).join('')}</div>`;
  }
  function screenTeams() {
    if (state.selTeam) return teamDetail(state.selTeam);
    return `<div class="section-title">All 48 teams<span class="rule"></span></div><div class="rows">${WCF.teams.map(teamRow).join('')}</div>`;
  }
  function teamDetail(code) {
    const t = WCF.teamByCode[code];
    const stages = [['win', 'Win'], ['final', 'Final'], ['sf', 'Semi'], ['qf', 'Quarter'], ['r16', 'Last 16'], ['r32', 'Last 32']];
    const maxStage = t.r32;
    const inj = WCF.injuries[code] || [];
    const scn = WCF.scenarios[code] || [];
    const w = store.isWatched(code);
    const isPick = state.profile.prediction === code;
    return `
      <button class="back-link" id="backTeams">← All teams</button>
      <div class="panel" style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
        ${flag(t.iso, 'flag-lg')}
        <div style="flex:1"><div style="font-size:23px;font-weight:700;letter-spacing:-0.02em">${t.name}</div><div style="font-size:11.5px;font-weight:600;color:var(--muted)">GROUP ${t.grp} · ${t.conf} · RANK #${t.rank}</div></div>
        <div style="text-align:right"><div class="num" style="font-size:32px;font-weight:600;color:var(--mint);line-height:1">${t.win.toFixed(1)}%</div><div style="font-size:10.5px;font-weight:600;color:var(--muted)">to win</div></div>
      </div>
      <div style="display:flex;gap:9px;margin:12px 0 2px">
        <button class="btn-primary" id="pickBtn" style="flex:1;${isPick ? 'background:rgba(52,245,160,.16);color:var(--mint);border:1px solid var(--mint)' : ''}">${isPick ? '🏆 Your champion pick' : 'Pick as champion'}</button>
        <button class="star ${w ? 'on' : ''}" id="watchBtn" data-watch="${code}" style="width:48px;height:auto;border:1px solid var(--stroke);font-size:18px">${w ? '★' : '☆'}</button>
      </div>
      ${t.lowConf ? `<div class="null-badge" style="margin:10px 0">⚠ Low-confidence — small xG sample (${t.mp} matches)</div>` : ''}
      <div class="section-title">Run to glory — reach probability<span class="rule"></span></div>
      <div class="panel">${stages.map(([k, l]) => `<div class="funnel-row"><div class="funnel-lbl">${l}</div><div class="funnel-track"><div class="funnel-fill num" style="width:${Math.max(t[k] / maxStage * 100, 7)}%">${t[k].toFixed(1)}%</div></div></div>`).join('')}</div>
      <div class="section-title">Underlying numbers<span class="rule"></span></div>
      ${t.xg === null
        ? `<div class="null-badge">◎ No xG data — baseline only<br><span style="opacity:.85">Ranked on Elo + market priors. ${t.conf} coverage gap.</span></div>`
        : `<div class="stat-grid">
            <div class="stat-box"><div class="sb-l">xG / 90</div><div class="sb-v num">${t.xg.toFixed(2)}</div><div class="sb-x">attack output</div></div>
            <div class="stat-box"><div class="sb-l">xGA / 90</div><div class="sb-v num">${t.xga.toFixed(2)}</div><div class="sb-x">goals conceded est.</div></div>
            <div class="stat-box"><div class="sb-l">Sample</div><div class="sb-v num">${t.mp}</div><div class="sb-x">matches (MP)</div></div>
            <div class="stat-box"><div class="sb-l">Confed.</div><div class="sb-v" style="font-size:16px">${t.conf}</div><div class="sb-x">region</div></div>
          </div>`}
      ${scn.length ? `<div class="section-title">Scenarios<span class="rule"></span></div><div class="panel">${scn.map(s => `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--stroke-soft)"><span style="font-size:13.5px;font-weight:500">${s.n}</span><span class="num ${s.d > 0 ? 'up' : 'down'}" style="font-weight:700">${s.d > 0 ? '+' : ''}${s.d.toFixed(1)} pp</span></div>`).join('')}</div>` : ''}
      <div class="section-title">Availability<span class="rule"></span></div>
      <div class="panel">${inj.length ? inj.map(i => `<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--stroke-soft)"><div><div style="font-size:13.5px;font-weight:600">${i.p}</div><div style="font-size:11.5px;font-weight:500;color:var(--muted)">${i.s}</div></div><div style="font-size:11.5px;font-weight:500;color:var(--muted);text-align:right;align-self:center">${i.d}</div></div>`).join('') : '<div style="color:var(--muted);font-size:13px;font-weight:500">Full squad available — no reported injuries.</div>'}</div>`;
  }

  // =================== MATCH ===================
  function poisson(l, k) { return Math.pow(l, k) * Math.exp(-l) / fact(k); }
  function fact(n) { let r = 1; for (let i = 2; i <= n; i++) r *= i; return r; }
  function simulate(a, b) {
    const sa = Math.max(0.2, a.win), sb = Math.max(0.2, b.win);
    const ratio = sa / (sa + sb);
    const lamA = 0.7 + ratio * 1.9 + (a.xg ? (a.xg - 1.2) * 0.3 : 0);
    const lamB = 0.7 + (1 - ratio) * 1.9 + (b.xg ? (b.xg - 1.2) * 0.3 : 0);
    let pw = 0, pd = 0, pl = 0, best = { p: 0, s: '0–0' };
    for (let i = 0; i <= 6; i++) for (let j = 0; j <= 6; j++) {
      const p = poisson(lamA, i) * poisson(lamB, j);
      if (i > j) pw += p; else if (i === j) pd += p; else pl += p;
      if (p > best.p) best = { p, s: i + '–' + j };
    }
    const tot = pw + pd + pl;
    return { w: pw / tot * 100, d: pd / tot * 100, l: pl / tot * 100, lamA, lamB, score: best.s };
  }
  function screenMatch() {
    const a = WCF.teamByCode[state.matchA], b = WCF.teamByCode[state.matchB];
    const r = simulate(a, b);
    const opts = sel => WCF.teams.map(t => `<option value="${t.code}" ${t.code === sel ? 'selected' : ''}>${t.name}</option>`).join('');
    return `
      <div class="section-title">Single-match simulator<span class="rule"></span></div>
      <div class="picker"><select id="selA">${opts(state.matchA)}</select><span style="align-self:center;color:var(--muted);font-size:13px;font-weight:700">v</span><select id="selB">${opts(state.matchB)}</select></div>
      <div class="panel" style="margin-top:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="display:flex;align-items:center;gap:9px">${flag(a.iso, 'flag-lg')}<strong>${a.name}</strong></div><div style="display:flex;align-items:center;gap:9px"><strong>${b.name}</strong>${flag(b.iso, 'flag-lg')}</div></div>
        <div class="wdl-bar"><div class="wdl-seg wdl-w num" style="flex:${r.w}">${r.w.toFixed(0)}%</div><div class="wdl-seg wdl-d num" style="flex:${r.d}">${r.d.toFixed(0)}%</div><div class="wdl-seg wdl-l num" style="flex:${r.l}">${r.l.toFixed(0)}%</div></div>
        <div style="display:flex;justify-content:space-between;font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em"><span>${a.name} win</span><span>Draw</span><span>${b.name} win</span></div>
      </div>
      <div class="stat-grid" style="margin-top:14px">
        <div class="stat-box"><div class="sb-l">Expected goals</div><div class="sb-v num">${r.lamA.toFixed(2)} – ${r.lamB.toFixed(2)}</div><div class="sb-x">model λ</div></div>
        <div class="stat-box"><div class="sb-l">Most likely score</div><div class="sb-v num">${r.score}</div><div class="sb-x">modal outcome</div></div>
      </div>
      <div class="panel" style="margin-top:12px;font-size:12px;font-weight:500;color:var(--muted);line-height:1.55">Poisson model from each side's title-odds strength${(a.xg === null || b.xg === null) ? ' — note: one side is baseline-only (no xG), so widen the error bars.' : ' and xG profile.'}</div>`;
  }

  // =================== TIPS ===================
  function screenBet() {
    const por = WCF.teamByCode['POR'], spa = WCF.teamByCode['ESP'], ger = WCF.teamByCode['GER'], fra = WCF.teamByCode['FRA'], mar = WCF.teamByCode['MAR'];
    const tips = [
      { k: 'value', t: por, h: 'Portugal to reach the semis', d: `Model has Portugal climbing (+${por.delta.toFixed(1)} pp) and the market hasn't fully caught up. ${por.sf.toFixed(0)}% semi-final reach is a live edge — but it's a small xG sample, so stake modestly.` },
      { k: 'value', t: mar, h: 'Morocco as a deep-run dark horse', d: `Elite defensive xGA (${mar.xga.toFixed(2)}) and a 2022 semi behind them. ${mar.qf.toFixed(0)}% quarter-final reach offers tournament-long value at long odds.` },
      { k: 'caution', t: ger, h: 'Hold off on Germany to win', d: `A midfield injury knocked Germany ${ger.delta.toFixed(1)} pp this run. Defensive numbers are still elite, but the title price doesn't reflect the creativity gap. Wait for team news.` },
      { k: 'value', t: spa, h: 'Spain make the final', d: `The most complete side in the field: top midfield control and the deepest rotation. ${spa.final.toFixed(0)}% final reach is the model's single most confident headline number.` },
      { k: 'avoid', t: fra, h: 'France odds rely on reputation', d: `France sit #${fra.rank} on Elo + market priors with no xG sample this cycle. Don't over-trust the short price until you've seen them play.` }
    ];
    const card = x => `<div class="bet-card"><span class="bet-tag bet-${x.k}">${x.k === 'value' ? 'Value pick' : x.k === 'caution' ? 'Hold / caution' : 'Avoid the price'}</span><div class="bt">${flag(x.t.iso)} ${x.h}</div><div class="bd">${x.d}</div></div>`;
    return `
      <div class="section-title">Betting insight<span class="rule"></span></div>
      <div class="disclaimer">⚠ <strong>Guidance only — not betting tips or financial advice.</strong> These are model-derived talking points to help you read the odds. We never place bets or tell you how much to stake. 18+. If gambling affects you, seek support.</div>
      ${tips.map(card).join('')}
      <div class="panel" style="font-size:12px;font-weight:500;color:var(--muted);line-height:1.6"><strong style="color:var(--cream)">How to read these:</strong> a "value" flag means the model rates a team higher than a typical market price implies — an edge, not a certainty. "Caution" means something just changed. "Avoid" means the number rests on weak data. Always compare to real odds yourself.</div>`;
  }

  // =================== ME HUB ===================
  function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }
  function screenMe() {
    const p = state.profile;
    const initial = (state.user && state.user.email ? state.user.email[0] : '?').toUpperCase();
    const pick = p.prediction ? WCF.teamByCode[p.prediction] : null;
    const watch = p.watch.map(c => WCF.teamByCode[c]).filter(Boolean);
    return `
      <div class="me-hero">
        <div class="me-avatar">${initial}</div>
        <div><div class="mh-name">Welcome back</div><div class="mh-sub">${state.user ? state.user.email : 'Guest'}</div></div>
      </div>

      <div class="section-title">My champion pick<span class="rule"></span></div>
      ${pick ? `
        <div class="pick-card" data-team="${pick.code}" style="cursor:pointer">
          <div class="pc-l">Backing to lift the trophy</div>
          <div style="display:flex;align-items:center;gap:12px;margin-top:9px">
            ${flag(pick.iso, 'flag-lg')}
            <div style="flex:1"><div style="font-size:19px;font-weight:700">${pick.name}</div><div style="font-size:12px;font-weight:500;color:var(--muted)">Group ${pick.grp} · ${pick.conf}</div></div>
            <div style="text-align:right"><div class="num" style="font-size:26px;font-weight:600;color:var(--mint);line-height:1">${pick.win.toFixed(1)}%</div><div style="font-size:10px;font-weight:600;color:var(--muted)">model odds</div></div>
          </div>
        </div>`
        : `<div class="panel" style="text-align:center;padding:24px"><div style="font-size:30px;margin-bottom:8px">🏆</div><div style="font-size:14px;font-weight:600;margin-bottom:4px">No pick yet</div><div style="font-size:12.5px;font-weight:500;color:var(--muted);margin-bottom:14px">Open any team and tap "Pick as champion".</div><button class="btn-primary" id="goForecast">Browse favourites</button></div>`}

      <div class="section-title">My watchlist<span class="rule"></span></div>
      ${watch.length ? `<div class="rows">${watch.map(teamRow).join('')}</div>`
        : `<div class="panel" style="text-align:center;padding:22px"><div style="font-size:28px;margin-bottom:8px">⭐</div><div style="font-size:13px;font-weight:500;color:var(--muted)">Tap the star on any team to follow it here.</div></div>`}

      <div class="section-title">Activity feed<span class="rule"></span></div>
      ${p.feed.length ? `<div class="panel">${p.feed.map(f => `<div class="feed-item"><div class="feed-ico">${f.ico}</div><div><div class="fi-t">${f.text}</div><div class="fi-ts">${timeAgo(f.ts)}</div></div></div>`).join('')}</div>`
        : `<div class="panel" style="text-align:center;padding:22px;color:var(--muted);font-size:12.5px;font-weight:500">Your picks and saves will show up here.</div>`}

      <div class="section-title">More<span class="rule"></span></div>
      <button class="btn-ghost" id="methodBtn" style="margin-bottom:10px">🧮 How it works & model transparency</button>
      <button class="btn-ghost" id="signOut2" style="color:var(--red)">⏻ Sign out</button>`;
  }

  // =================== METHOD ===================
  function screenMethod() {
    return `
      <button class="back-link" id="backMe">← Back to Me</button>
      <div class="section-title">How the forecast works<span class="rule"></span></div>
      <div class="helpcard"><span class="emoji">🧮</span><h3>A robot plays the tournament 100,000 times</h3><p>We simulate the whole World Cup over and over with slightly different luck each time (a "Monte Carlo" engine). If Spain win the trophy in 13,500 out of 100,000 runs, that's a 13.5% chance.</p></div>
      <div class="helpcard"><span class="emoji">📈</span><h3>What feeds each team's strength</h3><p>Four ingredients: <strong>xG</strong> (chance quality, where we have data), <strong>Elo</strong> (long-run rating), <strong>injuries</strong> (who's fit), and a small, capped <strong>pundit signal</strong>. The mix decides how likely each team is to win any given match.</p></div>
      <div class="helpcard"><span class="emoji">🌍</span><h3>The honest part: data gaps</h3><p>Some teams have rich match data; many don't. Teams marked <em>"baseline only"</em> are ranked on reputation and ratings, not real chance data — so trust those numbers a little less.</p></div>
      <div class="section-title">Data coverage by region<span class="rule"></span></div>
      <div class="panel">${WCF.coverage.map(c => `<div class="cov-row"><span class="cov-name">${c.conf}</span><div class="cov-bar"><div class="cov-fill" style="width:${c.pct}%;${c.pct === 0 ? 'background:var(--red)' : c.pct < 50 ? 'background:var(--navy)' : ''}"></div></div><span class="cov-pct num">${c.pct}%</span></div>`).join('')}</div>
      <div class="section-title">Model fragility — read before trusting<span class="rule"></span></div>
      <div class="panel">${WCF.fragility.map(f => `<div class="frag-item"><div class="frag-dot"></div><div><div class="fr-t">${f.t}</div><div class="fr-s">${f.s}</div></div></div>`).join('')}</div>
      <div class="section-title">Pundit signal<span class="rule"></span></div>
      <div class="panel" style="font-size:12px;font-weight:500;color:var(--muted);line-height:1.55;margin-bottom:11px">Expert opinion is converted to a −1…+1 signal and <strong style="color:var(--cream)">hard-capped at ±25 Elo</strong> so a loud narrative can't hijack the model.</div>
      ${WCF.signals.slice(0, 5).map(s => { const t = WCF.teamByCode[s.code]; return `<div class="panel" style="margin-bottom:9px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:5px">${flag(t.iso)}<strong style="font-size:13.5px">${t.name}</strong><span class="num" style="margin-left:auto;font-size:11.5px;font-weight:600;color:var(--muted)">${s.conf}% conf</span></div><div class="gauge"><div class="needle" style="left:${(s.sig + 1) / 2 * 100}%"></div></div><div style="font-size:11.5px;font-weight:500;color:var(--muted);line-height:1.45">${s.claims[0]}<br><span style="opacity:.75">${s.note}</span></div></div>`; }).join('')}
      <div class="panel" style="text-align:center;font-size:11.5px;font-weight:500;color:var(--muted);margin-top:8px">Run ${WCF.runDate} · 100,000 simulations · v2.6</div>`;
  }

  // =================== WIRING ===================
  function openTeam(code) {
    state.selTeam = code; state.tab = 'teams';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'teams'));
    renderTab(); $('#content').scrollTop = 0;
  }
  function wireTab() {
    document.querySelectorAll('[data-watch]').forEach(el => el.onclick = (e) => {
      e.stopPropagation(); store.toggleWatch(el.dataset.watch); renderTab();
    });
    document.querySelectorAll('[data-team]').forEach(el => el.onclick = () => openTeam(el.dataset.team));
    const bt = $('#backTeams'); if (bt) bt.onclick = () => { state.selTeam = null; renderTab(); };
    document.querySelectorAll('[data-match]').forEach(el => el.onclick = () => { state.selMatch = el.dataset.match; renderTab(); $('#content').scrollTop = 0; });
    const bl = $('#backLive'); if (bl) bl.onclick = () => { state.selMatch = null; renderTab(); };
    document.querySelectorAll('.sortpill').forEach(el => el.onclick = () => { state.sortKey = el.dataset.sort; renderTab(); });
    const sa = $('#selA'), sb = $('#selB');
    if (sa) sa.onchange = () => { state.matchA = sa.value; renderTab(); };
    if (sb) sb.onchange = () => { state.matchB = sb.value; renderTab(); };
    const pick = $('#pickBtn'); if (pick) pick.onclick = () => { store.setPrediction(state.selTeam); renderTab(); };
    const go = $('#goForecast'); if (go) go.onclick = () => switchTab('forecast');
    const mb = $('#methodBtn'); if (mb) mb.onclick = () => { state.tab = 'method'; renderTab(); $('#content').scrollTop = 0; };
    const bm = $('#backMe'); if (bm) bm.onclick = () => { state.tab = 'me'; renderTab(); $('#content').scrollTop = 0; };
    const so = $('#signOut2'); if (so) so.onclick = () => { if (fbReady && auth.currentUser) auth.signOut(); state.user = null; stopLive(); renderAuth(); };
  }

  // =================== LIVE LOOP + REAL API ===================
  let cdTimer = null, fetchTimer = null;
  function startLive() {
    stopLive();
    cdTimer = setInterval(updateCountdown, 1000);
    fetchTimer = setInterval(() => { if (state.liveMode === 'live') refreshLive(); else fetchLive(); }, 15000);
  }
  function stopLive() { [cdTimer, fetchTimer].forEach(t => t && clearInterval(t)); cdTimer = fetchTimer = null; }
  function updateCountdown() {
    if (!(state.tab === 'live' && !state.selMatch && state.liveMode !== 'live')) return;
    const k = new Date(WCF.kickoff).getTime();
    let diff = Math.max(0, k - Date.now());
    const dd = Math.floor(diff / 86400000); diff -= dd * 86400000;
    const hh = Math.floor(diff / 3600000); diff -= hh * 3600000;
    const mm = Math.floor(diff / 60000); diff -= mm * 60000;
    const ss = Math.floor(diff / 1000);
    const set = (l, v) => { const el = $('#cd-' + l); if (el) el.textContent = String(v).padStart(2, '0'); };
    set('days', dd); set('hrs', hh); set('min', mm); set('sec', ss);
  }
  // Calls the Vercel serverless proxy (/api/live). Until that's deployed with an
  // API-Football key, this fails quietly and the screen stays in pre-tournament mode.
  async function fetchLive() {
    try {
      const ctrl = new AbortController(); const to = setTimeout(() => ctrl.abort(), 4500);
      const res = await fetch('/api/live', { signal: ctrl.signal, cache: 'no-store' }); clearTimeout(to);
      if (!res.ok) throw 0;
      const j = await res.json();
      if (j && Array.isArray(j.matches) && j.matches.length) { state.liveMatches = j.matches; state.liveMode = 'live'; }
      else { state.liveMode = 'pre'; state.liveMatches = null; }
    } catch (e) { state.liveMode = 'pre'; state.liveMatches = null; }
    if (state.tab === 'live' && !state.selMatch) renderTab();
  }
  async function refreshLive() {
    try {
      const res = await fetch('/api/live', { cache: 'no-store' }); if (!res.ok) return;
      const j = await res.json(); if (!j || !Array.isArray(j.matches)) return;
      state.liveMatches = j.matches.length ? j.matches : null;
      if (!j.matches.length) state.liveMode = 'pre';
      if (state.tab === 'live') { const c = $('#content'); if (c) { c.querySelector('.screen').innerHTML = state.selMatch ? matchDetail(state.selMatch) : screenLive(); wireTab(); } }
    } catch (e) {}
  }

  // =================== BOOT ===================
  function boot() {
    if (fbReady) {
      auth.onAuthStateChanged(async user => {
        if (user) { state.user = { email: user.email, uid: user.uid }; await store.load(); startApp(); }
        else if (!state.user) { renderAuth(); }
      });
      setTimeout(() => { if (!state.user && !$('.auth-box') && !$('.shell')) renderAuth(); }, 1200);
    } else { renderAuth(); }
  }
  boot();
})();

  </script>
</body>
</html>
