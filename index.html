<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Forecaster</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
    body { 
      background: linear-gradient(135deg, #0d3d0d 0%, #1a5d1a 30%, #0f4d0f 60%, #062206 100%);
      color: #e9e7dd; 
      font-family: "IBM Plex Sans", sans-serif;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px),
        linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
      pointer-events: none;
      z-index: -1;
    }
    
    .app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
    .header { background: rgba(20, 26, 24, 0.9); border-bottom: 1px solid #2a3229; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 18px; font-weight: 600; color: #e3b341; font-family: "Fraunces", serif; }
    .header-user { font-size: 11px; color: #b8b5a8; }
    .header-btn { background: #d2685a; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
    
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .tab-bar { display: flex; gap: 4px; background: rgba(20, 26, 24, 0.95); border-top: 1px solid #2a3229; padding: 8px 12px; overflow-x: auto; }
    .tab-btn { flex: 0 0 auto; padding: 8px 14px; border: none; background: transparent; color: #b8b5a8; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; white-space: nowrap; }
    .tab-btn.active { background: #e3b341; color: #0a0f0e; border-color: #e3b341; }
    .tab-btn:hover { border-color: #e3b341; }
    
    .screen { display: none; }
    .screen.active { display: block; }
    
    .top5 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .card { background: rgba(20, 26, 24, 0.8); border: 1px solid #2a3229; border-radius: 8px; padding: 12px; }
    .card-rank { font-size: 10px; color: #b8b5a8; margin-bottom: 6px; }
    .card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .card-pct { font-size: 22px; font-weight: 600; color: #e3b341; font-family: "IBM Plex Mono", monospace; }
    
    .team-row { display: flex; gap: 10px; align-items: center; padding: 12px; border-bottom: 1px solid #1a1f1d; cursor: pointer; transition: background 0.2s; }
    .team-row:hover { background: rgba(20, 26, 24, 0.5); }
    .team-rank { width: 20px; text-align: right; font-size: 11px; color: #b8b5a8; }
    .team-code { width: 35px; height: 24px; background: rgba(26, 31, 29, 0.8); border: 1px solid #2a3229; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
    .team-name { flex: 1; font-size: 13px; font-weight: 500; }
    .team-pct { font-size: 16px; font-weight: 600; color: #e3b341; width: 50px; text-align: right; font-family: "IBM Plex Mono", monospace; }
    .team-delta { width: 40px; text-align: right; font-size: 11px; font-weight: 600; }
    .delta-up { color: #46b87a; }
    .delta-down { color: #d2685a; }
    .delta-flat { color: #b8b5a8; }
    
    .section-title { font-size: 12px; color: #b8b5a8; text-transform: uppercase; letter-spacing: 0.08em; margin: 20px 0 12px 0; font-weight: 600; }
    
    .auth-screen { display: flex; align-items: center; justify-content: center; height: 100%; }
    .auth-box { background: rgba(20, 26, 24, 0.95); border: 1px solid #2a3229; border-radius: 12px; padding: 32px; width: 100%; max-width: 320px; }
    .auth-title { font-size: 24px; font-weight: 600; color: #e3b341; font-family: "Fraunces", serif; text-align: center; margin: 0 0 20px 0; }
    .auth-input { width: 100%; padding: 10px 12px; background: rgba(10, 15, 14, 0.8); border: 1px solid #2a3229; border-radius: 4px; color: #e9e7dd; font-size: 12px; margin-bottom: 12px; font-family: "IBM Plex Sans", sans-serif; }
    .auth-input::placeholder { color: #666; }
    .auth-btn { width: 100%; padding: 10px; background: #e3b341; color: #0a0f0e; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; margin-bottom: 12px; }
    .auth-btn:hover { background: #d4a533; }
    .auth-toggle { font-size: 11px; text-align: center; color: #b8b5a8; }
    .auth-link { color: #e3b341; cursor: pointer; text-decoration: underline; }
    
    .funnel { display: flex; gap: 4px; margin: 12px 0; }
    .funnel-bar { height: 20px; background: linear-gradient(90deg, #e3b341 0%, #d2a030 100%); border-radius: 2px; flex: 1; min-width: 20px; }
    
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
    .stat-box { background: rgba(26, 31, 29, 0.8); border: 1px solid #2a3229; border-radius: 6px; padding: 10px; }
    .stat-label { font-size: 10px; color: #b8b5a8; margin-bottom: 4px; }
    .stat-value { font-size: 16px; font-weight: 600; color: #e3b341; font-family: "IBM Plex Mono", monospace; }
    
    .scenario { background: rgba(26, 31, 29, 0.8); border: 1px solid #2a3229; border-radius: 6px; padding: 10px; margin: 8px 0; }
    .scenario-name { font-size: 11px; font-weight: 600; color: #e9e7dd; margin-bottom: 4px; }
    .scenario-delta { font-size: 12px; color: #d2685a; }
    .scenario-delta.positive { color: #46b87a; }
  </style>
</head>

    // Auth handlers
    async function handleLogin(email, password) {
      try {
        await auth.signInWithEmailAndPassword(email, password);
        renderApp();
      } catch (error) {
        alert('Login failed: ' + error.message);
      }
    }

    async function handleRegister(email, password) {
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        renderApp();
      } catch (error) {
        alert('Registration failed: ' + error.message);
      }
    }

    function handleLogout() {
      auth.signOut();
      renderApp();
    }

    // Rendering
    function renderAuth() {
      let isRegister = false;
      const app = document.getElementById('app');
      
      const render = () => {
        const email = document.querySelector('[data-email]')?.value || '';
        const password = document.querySelector('[data-password]')?.value || '';

              <div class="auth-toggle">

                <span class="auth-link" onclick="window.toggleAuth()"> ${isRegister ? 'Sign In' : 'Sign Up'}</span>
              </div>
            </div>
          </div>
        `;
      };
      
      window.toggleAuth = () => {
        isRegister = !isRegister;
        render();
      };
      
      window.handleAuth = (type) => {

        const password = document.querySelector('[data-password]').value;
        if (type === 'login') handleLogin(email, password);
        else handleRegister(email, password);
      };
      
      render();
    }

            </div>

            <div class="screen" id="signal">
              <div class="section-title">Pundit Signal</div>
              <p style="color: #b8b5a8; padding: 12px;">Signal analysis dashboard — coming soon</p>
            </div>

            <div class="screen" id="match">
              <div class="section-title">Match Simulator</div>
              <p style="color: #b8b5a8; padding: 12px;">Match-by-match Win/Draw/Loss simulator — coming soon</p>
            </div>

            <div class="screen" id="method">
              <div class="section-title">How It Works</div>
              <p style="color: #b8b5a8; padding: 12px;">Monte Carlo simulation: xG + Elo + injuries + pundit signal. Model updated daily.</p>
              <p style="color: #b8b5a8; padding: 12px; font-size: 11px;">Data as of: June 6, 2026</p>
            </div>
          </div>

          <div class="tab-bar">
            <button class="tab-btn ${currentTab === 'forecast' ? 'active' : ''}" onclick="window.switchTab('forecast')">Forecast</button>
            <button class="tab-btn ${currentTab === 'teams' ? 'active' : ''}" onclick="window.switchTab('teams')">Teams</button>
            <button class="tab-btn ${currentTab === 'signal' ? 'active' : ''}" onclick="window.switchTab('signal')">Signal</button>
            <button class="tab-btn ${currentTab === 'match' ? 'active' : ''}" onclick="window.switchTab('match')">Match</button>
            <button class="tab-btn ${currentTab === 'method' ? 'active' : ''}" onclick="window.switchTab('method')">Method</button>
          </div>
        </div>
      `;
    }

    // Global functions
    window.switchTab = (tab) => {
      currentTab = tab;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab)?.classList.add('active');
      document.querySelector(`button[onclick*="'${tab}'"]`)?.classList.add('active');
    };

    window.selectTeam = (idx) => {
      selectedTeam = idx;
      currentTab = 'teams';
      renderApp();
      window.switchTab('teams');
    };

    window.handleLogout = () => {
      handleLogout();
    };

    // Watch auth state
    auth.onAuthStateChanged((user) => {
      currentUser = user;
      renderApp();
    });
  </script>
</body>
</html>
